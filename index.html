<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍콩반점 이용 안내</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background-color: #f4f4f4; }
        
        .popup-container {
            position: relative;
            width: 100vw;
            max-width: 800px;
            background-image: url('./skt0week_05hk.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            aspect-ratio: 800 / 1050; 
        }

        .content-text {
            position: absolute;
            left: 10%;
            right: 10%;
            color: #333;
            font-size: 18px; /* 기본 폰트 크기 */
            line-height: 1.5;
            font-weight: bold;
            display: flex;
            align-items: center; 
            justify-content: center; 
            text-align: center;
            white-space: pre-line; 
            word-break: keep-all;
        }

        /* 1. 이용가능매장: 텍스트를 더 키우고 위치 조정 */
        .box-1 { 
            top: 20%; /* 위치 미세 조정 */
            height: 6.5%; 
            font-size: 24px !important; /* 여기 수치를 키우면 글자가 더 커집니다 */
        }

        /* 2. 사용불가매장 */
        .box-2 { 
            top: 32%; 
            height: 38%; 
            font-size: 20px !important;
        }

        /* 3. 포장/배달 전문매장 */
        .box-3 { 
            top: 79%; 
            height: 15%; 
            font-size: 20px !important;
        }
    </style>
</head>
<body>

<div class="popup-container">
    <div class="content-text box-1">전국 홍콩반점 매장 (일부 매장 제외)</div>

    <div class="content-text box-2">
        모다천안아산점, AK광명점, 부산사직점,<br>
        과천렛츠런파크점, 홍대입구역점, LGD파주점,<br>
        포항해병1사단점, 강서홈플러스점, 일산벨라시티점,<br>
        다산진건점, 안산본오점, 인천완정역점, 진주초전점,<br>
        전북남원점, 메리그라운드향동점
    </div>

    <div class="content-text box-3">
        인천만수점, 상일동역점, 응암점, 신풍점,<br>
        인천계산중앙점, 명일동점, 독립문점, 부천도당점.<br>
        송도더테라스점, 송도SK뷰센트럴점
    </div>
</div>

</body>
</html>
