<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍콩반점 이용 안내</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background-color: #f4f4f4; }
        
        .popup-container {
            position: relative;
            width: 100vw;
            max-width: 800px;
            background-image: url('./skt0week_05hk.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            aspect-ratio: 800 / 1050; 
        }

        .content-text {
            position: absolute;
            /* 좌우 치우침을 해결하기 위해 여백을 동일하게(10%) 맞추고 중앙 정렬 */
            left: 10%;
            right: 10%;
            color: #333;
            font-size: 16px; 
            line-height: 1.5;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: pre-line; 
            word-break: keep-all;
        }

        /* 1. 이용가능매장: 위치를 아래로 더 내림 (18.5% -> 20.5%) */
        .box-1 { 
            top: 20.5%; 
            height: 6%; 
        }

        /* 2. 사용불가매장: 위치 및 높이 조절 */
        .box-2 { 
            top: 36%; 
            height: 35%; 
        }

        /* 3. 포장/배달 전문매장: 위치 상단으로 살짝 올림 (80.5% -> 81%) */
        .box-3 { 
            top: 81%; 
            height: 15%; 
        }
    </style>
</head>
<body>

<div class="popup-container">
    <div class="content-text box-1">전국 홍콩반점 매장<br>(일부 매장 제외)</div>

    <div class="content-text box-2">
        모다천안아산점, AK광명점, 부산사직점,<br>
        과천렛츠런파크점, 홍대입구역점, LGD파주점,<br>
        포항해병1사단점, 강서홈플러스점, 일산벨라시티점,<br>
        다산진건점, 안산본오점, 인천완정역점, 진주초전점,<br>
        전북남원점, 인천검암점, 메리그라운드향동점
    </div>

    <div class="content-text box-3">
        인천만수점, 상일동역점, 응암점,<br>
        인천계산중앙점, 명일동점, 독립문점,<br>
        송도더테라스점, 송도SK뷰센트럴점, 신풍점, 부천도당점
    </div>
</div>

</body>
</html>
