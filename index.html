<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍콩반점 이용 안내</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background-color: #f4f4f4; }
        
        .popup-container {
            position: relative;
            width: 100vw;
            max-width: 800px;
            background-image: url('./skt0week_05hk.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            aspect-ratio: 800 / 1050; 
        }

        .content-text {
            position: absolute;
            left: 10%;
            right: 10%;
            color: #333;
            /* 폰트 사이즈를 16px로 강제 고정 */
            font-size: 16px !important; 
            line-height: 1.6;
            font-weight: bold;
            display: flex;
            align-items: center; /* 세로 중앙 정렬 */
            justify-content: center; /* 가로 중앙 정렬 */
            text-align: center;
            white-space: pre-line; 
            word-break: keep-all;
        }

        /* 1. 이용가능매장: 위치 살짝 아래로 */
        .box-1 { 
            top: 19.5%; 
            height: 6%; 
        }

        /* 2. 사용불가매장: 중앙에 잘 위치하도록 조절 */
        .box-2 { 
            top: 34%; 
            height: 38%; 
            align-items: flex-start; /* 내용이 많으므로 상단부터 정렬 원할 시 사용 (중앙이 좋으면 center로 유지) */
            padding-top: 20px; /* 상단 여백 살짝 추가 */
            box-sizing: border-box;
        }

        /* 3. 포장/배달 전문매장: 위치 조정 */
        .box-3 { 
            top: 80.5%; 
            height: 15%; 
        }
    </style>
</head>
<body>

<div class="popup-container">
    <div class="content-text box-1">전국 홍콩반점 매장 (일부 매장 제외)</div>

    <div class="content-text box-2">
        모다천안아산점, AK광명점, 부산사직점,<br>
        과천렛츠런파크점, 홍대입구역점, LGD파주점,<br>
        포항해병1사단점, 강서홈플러스점, 일산벨라시티점,<br>
        다산진건점, 안산본오점, 인천완정역점, 진주초전점,<br>
        전북남원점, 인천검암점, 메리그라운드향동점
    </div>

    <div class="content-text box-3">
        인천만수점, 상일동역점, 응암점,<br>
        인천계산중앙점, 명일동점, 독립문점,<br>
        송도더테라스점, 송도SK뷰센트럴점,<br>
        신풍점, 부천도당점
    </div>
</div>

</body>
</html>
