<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍콩반점 이용 안내</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background-color: #f4f4f4; }
        
        .popup-container {
            position: relative;
            width: 100vw;
            max-width: 800px;
            background-image: url('./skt0week_05hk.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            aspect-ratio: 800 / 1050; 
        }

        .content-text {
            position: absolute;
            /* 왼쪽으로 옮기기 위해 left는 줄이고, right는 늘립니다 */
            left: 5%;   /* 기존 10%에서 5%로 줄여서 더 왼쪽부터 시작하게 함 */
            right: 25%; /* 오른쪽 여백을 더 주어 전체적으로 왼쪽으로 치우치게 함 */
            color: #333;
            font-size: 20px; 
            line-height: 1.5;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* 텍스트 박스 안에서 줄바꿈이 잘 먹도록 설정 */
            white-space: pre-line; 
            word-break: keep-all;
        }

        .box-1 { top: 18.5%; height: 8%; }
        .box-2 { top: 34%; height: 38%; }
        .box-3 { top: 80.5%; height: 16%; }
    </style>
</head>
<body>

<div class="popup-container">
    <div class="content-text box-1">전국 홍콩반점 매장<br>(일부 매장 제외)</div>

    <div class="content-text box-2">
        모다천안아산점, AK광명점, 부산사직점,<br>
        과천렛츠런파크점, 홍대입구역점, LGD파주점,<br>
        포항해병1사단점, 강서홈플러스점, 일산벨라시티점,<br>
        다산진건점, 안산본오점, 인천완정역점, 진주초전점,<br>
        전북남원점, 인천검암점, 메리그라운드향동점
    </div>

    <div class="content-text box-3">
        인천만수점, 상일동역점, 응암점,<br>
        인천계산중앙점, 명일동점, 독립문점,<br>
        송도더테라스점, 송도SK뷰센트럴점, 신풍점, 부천도당점
    </div>
</div>

</body>
</html>
